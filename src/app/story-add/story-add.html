<h2>Thêm truyện tranh</h2>

<form [formGroup]="addForm" (ngSubmit)="submitForm()">
  <div>
    <label>Tên truyện</label>
    <input class="border border-gray-300 rounded py-2 px-4" type="text" formControlName="title" />
  </div>

  <div>
    <label>Tác giả</label>
    <input class="border border-gray-300 rounded py-2 px-4" type="text" formControlName="author" />
  </div>

  <div>
    <label>Lượt xem</label>
    <input class="border border-gray-300 rounded py-2 px-4" type="number" formControlName="views" />
  </div>

  <button class="bg-blue-500 text-white px-4 py-2 rounded" type="submit">Thêm truyện</button>
</form>
