<h2>Danh sách truyện tranh</h2>

<table border="1" cellpadding="10" cellspacing="0">
  <thead>
    <tr>
      <th>STT</th>
      <th>Hình ảnh</th>
      <th>Tên truyện</th>
      <th>Tác giả</th>
      <th>Lượt xem</th>
      <th>Xuất bản</th>
      <th>Thể loại</th>
    </tr>
  </thead>

  <tbody>
    @for (story of stories; track story; let i = $index) {
      <tr>
        <td>{{ i + 1 }}</td>
        <td>
          <img [src]="story.image" [alt]="story.title" width="100" height="100">
        </td>
        <td>{{ story.title }}</td>
        <td>{{ story.author }}</td>
        <td>{{ story.views }}</td>
        <td>{{ story.born }}</td>
        <td>{{ story.category }}</td>
      </tr>
    }
  </tbody>
</table>
